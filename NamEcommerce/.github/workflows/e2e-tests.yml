name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Tests/NamEcommerce.Web.E2E.Tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Tests/NamEcommerce.Web.E2E.Tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start NamEcommerce Web
        working-directory: Presentation/NamEcommerce.Web
        run: |
          dotnet build
          dotnet run &
          sleep 10 # Waiting for the web app to start

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Tests/NamEcommerce.Web.E2E.Tests/playwright-report
